---
# CI del laboratorio: en cada push/PR se valida el código Ansible y,
# como el laboratorio funciona contra localhost, los playbooks se
# EJECUTAN de verdad en el runner de GitHub (incluida la prueba de
# idempotencia: la segunda pasada no debe cambiar nada).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint (ansible-lint)
    runs-on: ubuntu-latest
    env:
      # El linter necesita poder descifrar vars/secretos.yml
      ANSIBLE_VAULT_PASSWORD_FILE: .vault_pass
    steps:
      - name: Descargar el código
        uses: actions/checkout@v5

      - name: Crear el fichero de contraseña del vault (demo)
        run: echo "laboratorio-demo" > .vault_pass

      - name: Instalar ansible-lint
        run: pipx install ansible-lint && pipx inject --include-apps ansible-lint ansible-core

      - name: Instalar las colecciones de Galaxy (requirements.yml)
        run: ansible-galaxy collection install -r requirements.yml

      - name: Ejecutar ansible-lint
        run: ansible-lint

  ejecutar:
    name: Ejecutar playbooks (localhost)
    runs-on: ubuntu-latest
    env:
      ANSIBLE_VAULT_PASSWORD_FILE: .vault_pass
    steps:
      - name: Descargar el código
        uses: actions/checkout@v5

      - name: Crear el fichero de contraseña del vault (demo)
        run: echo "laboratorio-demo" > .vault_pass

      - name: Instalar ansible-core
        run: pipx install ansible-core

      - name: Instalar las colecciones de Galaxy (requirements.yml)
        run: ansible-galaxy collection install -r requirements.yml

      - name: Comprobar sintaxis de todos los playbooks
        run: |
          for pb in playbooks/*.yml; do
            ansible-playbook --syntax-check "$pb"
          done

      - name: "Playbook 1 — ping y facts"
        run: ansible-playbook playbooks/01_ping.yml

      - name: "Playbook 2 — informe del sistema"
        run: ansible-playbook playbooks/02_informe_sistema.yml

      - name: "Playbook 3 — despliegue simulado (1ª pasada)"
        run: ansible-playbook playbooks/03_desplegar_app_simulada.yml

      - name: "Playbook 3 — 2ª pasada: comprobar idempotencia (changed=0)"
        run: |
          salida=$(ansible-playbook playbooks/03_desplegar_app_simulada.yml)
          echo "$salida" | tail -3
          echo "$salida" | grep -q "changed=0" || { echo "::error::El playbook no es idempotente"; exit 1; }

      - name: "Playbook 4 — panel web con rol"
        run: ansible-playbook playbooks/04_panel_web_con_rol.yml

      - name: "Playbook 5 — auditoría de salud"
        run: ansible-playbook playbooks/05_auditoria_salud.yml

      - name: "Playbook 6 — secretos con ansible-vault"
        run: ansible-playbook playbooks/06_secretos_vault.yml

      - name: "Playbook 8 — colecciones de Galaxy (1ª pasada)"
        run: ansible-playbook playbooks/08_colecciones_galaxy.yml

      - name: "Playbook 8 — 2ª pasada: comprobar idempotencia (changed=0)"
        run: |
          salida=$(ansible-playbook playbooks/08_colecciones_galaxy.yml)
          echo "$salida" | tail -3
          echo "$salida" | grep -q "changed=0" || { echo "::error::El playbook no es idempotente"; exit 1; }

      - name: "Playbook 9 — ensayo (--check --diff) sobre entorno limpio"
        run: ansible-playbook playbooks/09_ensayo_check_diff.yml --check --diff

      - name: "Playbook 9 — un ensayo no toca el disco"
        run: |
          if [ -e entorno-prueba/ensayo ]; then
            echo "::error::El --check ha creado entorno-prueba/ensayo — un ensayo no debe tocar nada"
            exit 1
          fi

      - name: "Playbook 9 — ejecución real"
        run: ansible-playbook playbooks/09_ensayo_check_diff.yml

      - name: "Playbook 9 — 2ª pasada: changed=1 exacto (solo la limpieza ensayada)"
        run: |
          salida=$(ansible-playbook playbooks/09_ensayo_check_diff.yml)
          echo "$salida" | tail -3
          # El único "cambio" legítimo es el borrado con check_mode: true, que
          # se ensaya en cada pasada pero nunca llega al disco. Más de uno =
          # el playbook no es idempotente; cero = la lección desapareció.
          echo "$salida" | grep -q "changed=1 " || { echo "::error::Se esperaba changed=1 (la limpieza ensayada)"; exit 1; }
          test -d entorno-prueba/ensayo || { echo "::error::La limpieza ensayada ha borrado de verdad"; exit 1; }

      - name: "Playbook 10 — facts personalizados (1ª pasada)"
        run: ansible-playbook playbooks/10_facts_personalizados.yml

      - name: "Playbook 10 — 2ª pasada: comprobar idempotencia (changed=0)"
        run: |
          salida=$(ansible-playbook playbooks/10_facts_personalizados.yml)
          echo "$salida" | tail -3
          echo "$salida" | grep -q "changed=0" || { echo "::error::El playbook no es idempotente"; exit 1; }

      - name: Capturar el panel en PNG (Chrome del runner)
        run: |
          google-chrome --headless=new --no-sandbox --hide-scrollbars \
            --window-size=1280,650 \
            --screenshot=informes/captura-panel.png \
            "file://$PWD/$(ls informes/panel_*.html)"

      - name: Publicar los informes generados como artefacto
        uses: actions/upload-artifact@v5
        with:
          name: informes
          path: informes/

      - name: Preparar el panel para GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          cp informes/panel_*.html _site/index.html
          cp informes/captura-panel.png _site/

      - name: Subir el panel como artefacto de Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site/

  multihost:
    name: Flota multi-host (Docker + SSH)
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v5

      - name: Instalar ansible-core
        run: pipx install ansible-core

      - name: Levantar la flota (3 contenedores con SSH)
        run: ./flota.sh up

      - name: Esperar a que el SSH de los nodos responda
        run: ./flota.sh esperar

      - name: "Playbook 7 — desplegar en toda la flota (1ª pasada)"
        run: ansible-playbook -i inventario_flota.ini playbooks/07_flota_multihost.yml

      - name: "Playbook 7 — 2ª pasada: idempotencia en los 3 nodos"
        run: |
          salida=$(ansible-playbook -i inventario_flota.ini playbooks/07_flota_multihost.yml)
          echo "$salida" | tail -6
          ceros=$(echo "$salida" | grep -c "changed=0" || true)
          [ "$ceros" = "3" ] || { echo "::error::Algún nodo no fue idempotente"; exit 1; }

      - name: Apagar la flota
        if: always()
        run: ./flota.sh down

  publicar:
    name: Publicar demo en GitHub Pages
    if: github.ref == 'refs/heads/main'
    # La demo solo se publica si TODOS los checks pasan: lint, playbooks y flota
    needs: [lint, ejecutar, multihost]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en Pages
        id: deployment
        uses: actions/deploy-pages@v4
