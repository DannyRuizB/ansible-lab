---
# CI del laboratorio: en cada push/PR se valida el código Ansible y,
# como el laboratorio funciona contra localhost, los playbooks se
# EJECUTAN de verdad en el runner de GitHub (incluida la prueba de
# idempotencia: la segunda pasada no debe cambiar nada).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint (ansible-lint)
    runs-on: ubuntu-latest
    env:
      # El linter necesita poder descifrar vars/secretos.yml
      ANSIBLE_VAULT_PASSWORD_FILE: .vault_pass
    steps:
      - name: Descargar el código
        uses: actions/checkout@v5

      - name: Crear el fichero de contraseña del vault (demo)
        run: echo "laboratorio-demo" > .vault_pass

      - name: Instalar ansible-lint
        run: pipx install ansible-lint && pipx inject --include-apps ansible-lint ansible-core

      - name: Instalar las colecciones de Galaxy (requirements.yml)
        run: ansible-galaxy collection install -r requirements.yml

      - name: Ejecutar ansible-lint
        run: ansible-lint

  ejecutar:
    name: Ejecutar playbooks (localhost)
    runs-on: ubuntu-latest
    env:
      ANSIBLE_VAULT_PASSWORD_FILE: .vault_pass
    steps:
      - name: Descargar el código
        uses: actions/checkout@v5

      - name: Crear el fichero de contraseña del vault (demo)
        run: echo "laboratorio-demo" > .vault_pass

      - name: Instalar ansible-core
        run: pipx install ansible-core

      - name: Instalar las colecciones de Galaxy (requirements.yml)
        run: ansible-galaxy collection install -r requirements.yml

      - name: Comprobar sintaxis de todos los playbooks
        run: |
          for pb in playbooks/*.yml; do
            ansible-playbook --syntax-check "$pb"
          done

      - name: "Playbook 1 — ping y facts"
        run: ansible-playbook playbooks/01_ping.yml

      - name: "Playbook 2 — informe del sistema"
        run: ansible-playbook playbooks/02_informe_sistema.yml

      - name: "Playbook 3 — despliegue simulado (1ª pasada)"
        run: ansible-playbook playbooks/03_desplegar_app_simulada.yml

      - name: "Playbook 3 — 2ª pasada: comprobar idempotencia (changed=0)"
        run: |
          salida=$(ansible-playbook playbooks/03_desplegar_app_simulada.yml)
          echo "$salida" | tail -3
          echo "$salida" | grep -q "changed=0" || { echo "::error::El playbook no es idempotente"; exit 1; }

      - name: "Playbook 4 — panel web con rol"
        run: ansible-playbook playbooks/04_panel_web_con_rol.yml

      - name: "Playbook 5 — auditoría de salud"
        run: ansible-playbook playbooks/05_auditoria_salud.yml

      - name: "Playbook 6 — secretos con ansible-vault"
        run: ansible-playbook playbooks/06_secretos_vault.yml

      - name: "Playbook 8 — colecciones de Galaxy (1ª pasada)"
        run: ansible-playbook playbooks/08_colecciones_galaxy.yml

      - name: "Playbook 8 — 2ª pasada: comprobar idempotencia (changed=0)"
        run: |
          salida=$(ansible-playbook playbooks/08_colecciones_galaxy.yml)
          echo "$salida" | tail -3
          echo "$salida" | grep -q "changed=0" || { echo "::error::El playbook no es idempotente"; exit 1; }

      - name: "Playbook 9 — ensayo (--check --diff) sobre entorno limpio"
        run: ansible-playbook playbooks/09_ensayo_check_diff.yml --check --diff

      - name: "Playbook 9 — un ensayo no toca el disco"
        run: |
          if [ -e entorno-prueba/ensayo ]; then
            echo "::error::El --check ha creado entorno-prueba/ensayo — un ensayo no debe tocar nada"
            exit 1
          fi

      - name: "Playbook 9 — ejecución real"
        run: ansible-playbook playbooks/09_ensayo_check_diff.yml

      - name: "Playbook 9 — 2ª pasada: changed=1 exacto (solo la limpieza ensayada)"
        run: |
          salida=$(ansible-playbook playbooks/09_ensayo_check_diff.yml)
          echo "$salida" | tail -3
          # El único "cambio" legítimo es el borrado con check_mode: true, que
          # se ensaya en cada pasada pero nunca llega al disco. Más de uno =
          # el playbook no es idempotente; cero = la lección desapareció.
          echo "$salida" | grep -q "changed=1 " || { echo "::error::Se esperaba changed=1 (la limpieza ensayada)"; exit 1; }
          test -d entorno-prueba/ensayo || { echo "::error::La limpieza ensayada ha borrado de verdad"; exit 1; }

      - name: "Playbook 10 — facts personalizados (1ª pasada)"
        run: ansible-playbook playbooks/10_facts_personalizados.yml

      - name: "Playbook 10 — 2ª pasada: comprobar idempotencia (changed=0)"
        run: |
          salida=$(ansible-playbook playbooks/10_facts_personalizados.yml)
          echo "$salida" | tail -3
          echo "$salida" | grep -q "changed=0" || { echo "::error::El playbook no es idempotente"; exit 1; }

      - name: "Playbook 11 — esperas y reintentos (1ª pasada)"
        run: ansible-playbook playbooks/11_esperas_y_reintentos.yml

      - name: "Playbook 11 — 2ª pasada: comprobar idempotencia (changed=0)"
        run: |
          salida=$(ansible-playbook playbooks/11_esperas_y_reintentos.yml)
          echo "$salida" | tail -3
          echo "$salida" | grep -q "changed=0" || { echo "::error::El playbook no es idempotente"; exit 1; }

      - name: "Playbook 12 — import vs include (1ª pasada)"
        run: ansible-playbook playbooks/12_import_vs_include.yml

      - name: "Playbook 12 — 2ª pasada: comprobar idempotencia (changed=0)"
        run: |
          salida=$(ansible-playbook playbooks/12_import_vs_include.yml)
          echo "$salida" | tail -3
          echo "$salida" | grep -q "changed=0" || { echo "::error::El playbook no es idempotente"; exit 1; }

      - name: "Playbook 15 — Jinja avanzado (1ª pasada, asserts incluidos)"
        run: ansible-playbook playbooks/15_plantillas_jinja_avanzadas.yml

      - name: "Playbook 15 — 2ª pasada: comprobar idempotencia (changed=0)"
        run: |
          salida=$(ansible-playbook playbooks/15_plantillas_jinja_avanzadas.yml)
          echo "$salida" | tail -3
          echo "$salida" | grep -q "changed=0" || { echo "::error::El playbook no es idempotente"; exit 1; }

      # El 16 no lleva pasada de idempotencia: sus logs de orden son append y
      # la demo de force_handlers limpia y repite — la verificación son sus
      # asserts (dedupe, orden, listen, flush y las dos rondas de fallo).
      - name: "Playbook 16 — handlers a fondo (asserts incluidos)"
        run: ansible-playbook playbooks/16_handlers_a_fondo.yml

      # El 17 tampoco: provoca fallos a propósito (rescues, ignore_errors,
      # loops con víctima) y repara — la verificación son sus asserts.
      - name: "Playbook 17 — errores a fondo (asserts incluidos)"
        run: ansible-playbook playbooks/17_errores_a_fondo.yml

      # El 18 tampoco: genera los vaults en cada ejecución (la sal del
      # cifrado cambia) — la verificación son sus asserts y las dos rondas
      # anidadas (etiquetas cambiadas con y sin ANSIBLE_VAULT_ID_MATCH).
      - name: "Playbook 18 — vault a fondo (asserts incluidos)"
        run: ansible-playbook playbooks/18_vault_a_fondo.yml

      # El 19 no toca disco (solo evalúa filtros Python custom y hace
      # asserts) — idempotente por construcción, la verificación son sus
      # asserts byte a byte.
      - name: "Playbook 19 — filtros a medida (asserts incluidos)"
        run: ansible-playbook playbooks/19_filtros_a_medida.yml

      # Como el 16 y el 18: la verificación son sus asserts (ronda sin
      # activar = sin fichero; ronda activada = resumen JSON correcto).
      - name: "Playbook 22 — callback a medida (asserts incluidos)"
        run: ansible-playbook playbooks/22_callback_a_medida.yml

      - name: Capturar el panel en PNG (Chrome del runner)
        run: |
          google-chrome --headless=new --no-sandbox --hide-scrollbars \
            --window-size=1280,650 \
            --screenshot=informes/captura-panel.png \
            "file://$PWD/$(ls informes/panel_*.html)"

      - name: Publicar los informes generados como artefacto
        uses: actions/upload-artifact@v5
        with:
          name: informes
          path: informes/

      - name: Preparar el panel para GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          cp informes/panel_*.html _site/index.html
          cp informes/captura-panel.png _site/

      - name: Subir el panel como artefacto de Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site/

  multihost:
    name: Flota multi-host (Docker + SSH)
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v5

      - name: Instalar ansible-core
        run: pipx install ansible-core

      - name: Levantar la flota (3 contenedores con SSH)
        run: ./flota.sh up

      - name: Esperar a que el SSH de los nodos responda
        run: ./flota.sh esperar

      - name: "Playbook 7 — desplegar en toda la flota (1ª pasada)"
        run: ansible-playbook -i inventario_flota.ini playbooks/07_flota_multihost.yml

      - name: "Playbook 7 — 2ª pasada: idempotencia en los 3 nodos"
        run: |
          salida=$(ansible-playbook -i inventario_flota.ini playbooks/07_flota_multihost.yml)
          echo "$salida" | tail -6
          ceros=$(echo "$salida" | grep -c "changed=0" || true)
          [ "$ceros" = "3" ] || { echo "::error::Algún nodo no fue idempotente"; exit 1; }

      # Los asserts del playbook comprueban las tres lecciones (barrera de
      # linear, adelantamiento en free, embudo sin solapes) — si una
      # estrategia no hace lo que promete, el playbook mismo falla.
      - name: "Playbook 13 — estrategias de ejecución (asserts incluidos)"
        run: ansible-playbook -i inventario_flota.ini playbooks/13_estrategias_ejecucion.yml

      # Los asserts cuentan ejecuciones en ficheros del controlador: si la
      # delegación, delegate_facts o run_once (con y sin serial) no hacen lo
      # que el playbook enseña, el propio playbook falla.
      - name: "Playbook 14 — delegación y run_once (asserts incluidos)"
        run: ansible-playbook -i inventario_flota.ini playbooks/14_delegacion_y_run_once.yml

      # La play 1 valida el contrato del script (--list, _meta, --host) desde
      # fuera y la play 2 se conecta por SSH real a lo que el script descubrió
      # en Docker: si el inventario dinámico inventara hosts o puertos, el
      # propio playbook falla.
      - name: "Playbook 20 — inventario dinámico (asserts incluidos)"
        run: ansible-playbook -i inventario_dinamico.py playbooks/20_inventario_dinamico.yml

      # La capa constructed se apila detrás del inventario dinámico; los
      # asserts cubren los grupos/vars derivados y la trampa doble de strict
      # (error tragado / aviso con rc 0 / any_unparsed_is_failed).
      - name: "Playbook 21 — inventario por capas (asserts incluidos)"
        run: ansible-playbook -i inventario_dinamico.py -i inventario_construido.yml playbooks/21_inventario_por_capas.yml

      # Lookup plugin: el play 3 conecta a la flota por SSH para demostrar
      # que el lookup corre en el controlador (verificación = sus asserts).
      - name: "Playbook 23 — lookup a medida (asserts incluidos)"
        run: ansible-playbook -i inventario_flota.ini playbooks/23_lookup_a_medida.yml

      # Action plugin: corre en el controlador y orquesta copy en el target
      # (verificación = sus asserts, incl. idempotencia y validación).
      - name: "Playbook 24 — action a medida (asserts incluidos)"
        run: ansible-playbook -i inventario_flota.ini playbooks/24_action_a_medida.yml

      - name: Apagar la flota
        if: always()
        run: ./flota.sh down

  publicar:
    name: Publicar demo en GitHub Pages
    if: github.ref == 'refs/heads/main'
    # La demo solo se publica si TODOS los checks pasan: lint, playbooks y flota
    needs: [lint, ejecutar, multihost]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en Pages
        id: deployment
        uses: actions/deploy-pages@v4
