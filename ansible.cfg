[defaults]
# Inventario por defecto: no hace falta pasar -i en cada comando
inventory = inventario.ini
# No crear ficheros .retry al fallar
retry_files_enabled = False
# Dónde buscar los roles del proyecto
roles_path = roles
# Filtros Jinja a medida escritos en Python (playbook 19). Sin esta línea
# Ansible solo miraría ./filter_plugins junto al playbook o al cwd; fijarla
# hace que se encuentren siempre, se ejecute desde donde se ejecute.
filter_plugins = filter_plugins
# Callbacks a medida (playbook 22). OJO: esto solo los hace VISIBLES; el
# lab_resumen declara CALLBACK_NEEDS_ENABLED y sigue apagado hasta que se
# activa (ANSIBLE_CALLBACKS_ENABLED=lab_resumen) — esa es su gracia.
callback_plugins = callback_plugins
# Lookups a medida (playbook 23). El lab_fichero corre en el CONTROLADOR
# aunque el play esté delegado a un nodo remoto — de ahí su gracia.
lookup_plugins = lookup_plugins
# Action plugins a medida (playbook 24). El lab_marca corre en el
# controlador y desde ahí orquesta el módulo copy en el target.
action_plugins = action_plugins
# Módulos a medida (playbook 25). El lab_sello corre ENTERO en el target
# (lo contrario del action): AnsibleModule con check_mode y changed.
library = library
# Intérprete de Python fijado: evita el aviso de "interpreter discovery" y
# sorpresas si el nodo trae varios Python. Vale para el WSL, los runners de
# CI y los contenedores de la flota (todos tienen /usr/bin/python3).
interpreter_python = /usr/bin/python3

[callback_default]
# Salida más legible en pantalla (formato YAML en los resultados)
result_format = yaml
