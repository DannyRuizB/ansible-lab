# Inventario de la "flota": 3 contenedores Docker locales gestionados por
# SSH de verdad (los levanta ./flota.sh up). A diferencia de inventario.ini,
# aquí Ansible se conecta como a servidores reales: clave SSH, puerto, usuario.
#
# Uso:  ansible-playbook -i inventario_flota.ini playbooks/07_flota_multihost.yml

[web]
web1 ansible_port=2201
web2 ansible_port=2202

[db]
db1 ansible_port=2203

# Grupo paraguas: "flota" = web + db (como los grupos del inventario de
# producción: comercializadoras, distribuidoras...)
[flota:children]
web
db

[flota:vars]
ansible_host=127.0.0.1
ansible_user=ansible
# {{ inventory_dir }} = carpeta de este fichero: las rutas funcionan desde
# cualquier directorio, no solo desde la raíz del repositorio.
ansible_ssh_private_key_file={{ inventory_dir }}/.ssh_lab/id_lab
# Los contenedores se recrean a menudo y cambian de host key: se acepta la
# primera y se guarda en un known_hosts propio del laboratorio.
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile={{ inventory_dir }}/.ssh_lab/known_hosts
