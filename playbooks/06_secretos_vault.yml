---
# =============================================================================
# Playbook 6 — Secretos cifrados con ansible-vault
#
# El fichero vars/secretos.yml está CIFRADO con ansible-vault: se puede
# subir a Git sin exponer nada. Este playbook lo descifra en tiempo de
# ejecución y usa los secretos para configurar la app simulada.
#
#   - vars_files ......... cargar variables desde fichero (cifrado o no)
#   - no_log ............. que el secreto no aparezca en la salida ni en logs
#
# La contraseña del vault de este laboratorio es "laboratorio-demo"
# (documentada porque es una demo; en un entorno real, JAMÁS se escribe).
#
# Ejecutar (pedirá la contraseña):
#   ansible-playbook playbooks/06_secretos_vault.yml --ask-vault-pass
#
# O con fichero de contraseña (ignorado por git):
#   echo "laboratorio-demo" > .vault_pass
#   ansible-playbook playbooks/06_secretos_vault.yml --vault-password-file .vault_pass
#
# Ver/editar el fichero cifrado:
#   ansible-vault view vars/secretos.yml --ask-vault-pass
#   ansible-vault edit vars/secretos.yml --ask-vault-pass
# =============================================================================

- name: Configurar secretos de la app simulada
  hosts: laboratorio
  gather_facts: true

  vars:
    app_base: "{{ ansible_facts['user_dir'] }}/ansible-lab/entorno-prueba/miapp"

  vars_files:
    - "{{ playbook_dir }}/../vars/secretos.yml"   # <- descifrado al vuelo

  tasks:
    - name: Asegurar que existe la carpeta de configuración
      ansible.builtin.file:
        path: "{{ app_base }}/config"
        state: directory
        mode: "0755"

    - name: Escribir los secretos en el .env (no_log activado)
      ansible.builtin.lineinfile:
        path: "{{ app_base }}/config/.env"
        line: "{{ item.clave }}={{ item.valor }}"
        regexp: "^{{ item.clave }}="
        create: true
        mode: "0600"    # solo el propietario puede leer un fichero con secretos
      loop:
        - { clave: "API_TOKEN", valor: "{{ api_token_simulado }}" }
        - { clave: "DB_PASSWORD", valor: "{{ db_password_simulada }}" }
      no_log: true
      # no_log: true evita que el valor del secreto salga por pantalla,
      # en los logs o en la salida de Semaphore/CI. La tarea muestra
      # "censored" en lugar del contenido.

    - name: Confirmar sin revelar nada
      ansible.builtin.debug:
        msg: >-
          Secretos aplicados en {{ app_base }}/config/.env
          (API_TOKEN de {{ api_token_simulado | length }} caracteres,
          DB_PASSWORD de {{ db_password_simulada | length }} caracteres).
